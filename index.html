<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta name="author" content="Alejandro Beccerra" />
    <meta
      name="description"
      content="Batter Boutique - Menú digital de arepas, pepitos, empanadas y más. Pedí online fácil y rápido."
    />
    <meta
      name="keywords"
      content="Batter Boutique, menú digital, arepas, pepitos, empanadas, comida rápida, delivery, pedidos online"
    />
    <meta name="robots" content="index, follow" />

    <meta property="og:title" content="Batter Boutique - Menú Digital" />
    <meta
      property="og:description"
      content="Mirá el menú digital de Batter Boutique y hacé tu pedido online fácil y rápido."
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="img/preview.jpg" />

    <title>Batter Boutique</title>

    <!-- BOOTSTRAP -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- SWEETALERT2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- ICONOS -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <!-- CSS -->
    <link rel="stylesheet" href="./css/style.alejo.css" />
  </head>

  <body class="alejandro-becerra-body">
    <!-- MARCO PRINCIPAL -->
    <div class="menu-frame container-fluid">
      <!-- HEADER -->
      <header class="menu-header text-center">
        <div class="top-logo">
          <img src="./img/logoAlejo.jpg" class="logo-circle" alt="Logo" />
        </div>

        <h1 class="menu-title" id="titleMain">BATTER BOUTIQUE –</h1>
        <p class="menu-subtitle" id="subtitleMain">pankes salados & drinks</p>

        <!-- SELECTOR IDIOMA -->
        <div class="language-box">
          <select id="langSelect" class="form-select form-select-sm">
            <option value="es">🇪🇸 Español</option>
            <option value="en">🇬🇧 English</option>
            <option value="nl">🇳🇱 Nederlands</option>
          </select>
        </div>

        <!-- BUSCADOR -->
        <div class="search-box">
          <div class="input-group">
            <span class="input-group-text search-icon"
              ><i class="fa fa-search"></i
            ></span>
            <input
              type="text"
              id="searchInput"
              class="form-control"
              placeholder="Buscar comida... (ej: pancakesSalados, pancakesDulces, cakes, drinks)"
            />
          </div>
        </div>
      </header>

      <!-- NOSOTROS -->
      <section class="nosotros-section text-center my-5 p-4 bg-light rounded">
        <div class="container">
          <h2 class="mb-3">Quiénes Somos</h2>
          <p class="mb-4">
            At <strong>Batter Boutique</strong>, we offer the best savory
            pancakes and refreshing drinks. Our goal is to make every bite and
            sip a delicious and quick experience.
          </p>
          <img
            src="./img/equipo.png"
            alt="Nuestro equipo"
            class="img-fluid rounded shadow-sm"
            style="max-width: 400px"
          />
        </div>
      </section>

      <!-- CONTENIDO -->
      <main class="container menu-content">
        <div class="row g-4" id="productsContainer">
          <!-- Productos se cargan desde JS -->
        </div>
      </main>

      <!-- FOOTER -->
      <footer class="menu-footer text-center mt-5">
        <p class="footer-text">© 2026 Batter Boutique</p>

        <div class="social-links">
          <a href="https://instagram.com/" target="_blank" class="social-btn"
            ><i class="fab fa-instagram"></i
          ></a>
          <a href="https://facebook.com/" target="_blank" class="social-btn"
            ><i class="fab fa-facebook"></i
          ></a>
          <a href="https://tiktok.com/" target="_blank" class="social-btn"
            ><i class="fab fa-tiktok"></i
          ></a>
        </div>

        <p class="footer-mail">📩 felipeliebano@gmail.com</p>
      </footer>
    </div>

    <!-- CARRITO -->
    <div class="cart-panel" id="cartPanel">
      <div class="cart-header">
        <h5 id="cartTitle">🛒 Carrito</h5>
        <button class="btn-close-cart" onclick="toggleCart()">✖</button>
      </div>

      <div class="cart-body" id="cartItems"></div>

      <div class="cart-footer">
        <h6 id="totalText">Total: €<span id="cartTotal">0</span></h6>

        <button
          class="btn btn-danger w-100 mb-2"
          onclick="clearCart()"
          id="clearCartBtn"
        >
          Vaciar carrito
        </button>

        <button
          class="btn btn-success w-100"
          onclick="checkout()"
          id="checkoutBtn"
        >
          Finalizar pedido
        </button>
      </div>
    </div>

    <!-- BOTON ABRIR CARRITO -->
    <button class="cart-floating-btn" onclick="toggleCart()">
      🛒 <span id="cartCount">0</span>
    </button>

    <!-- WHATSAPP FLOTANTE -->
    <a class="whatsapp-float" href="https://wa.me/31613966455" target="_blank"
      ><i class="fab fa-whatsapp"></i
    ></a>

    <!-- MODAL PRODUCTO -->
    <div class="modal fade" id="productModal" tabindex="-1">
      <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content product-modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="modalTitle">Producto</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
            ></button>
          </div>

          <div class="modal-body row">
            <div class="col-md-6 text-center">
              <img id="modalImage" src="" class="img-fluid modal-img" alt="" />
            </div>
            <div class="col-md-6">
              <h4 id="modalName"></h4>
              <p id="modalDesc"></p>
              <h5>€ <span id="modalPrice"></span></h5>

              <button
                class="btn btn-warning w-100 mt-3"
                onclick="addToCartFromModal()"
              >
                Agregar al carrito
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- BOOTSTRAP JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- JS -->
    <script src="./js/main.js"></script>
  </body>
</html>
